<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Demand princess treatment IMMEDIATELY." />
    <meta name="theme-color" content="#ff4d8f" />
    <meta name="darkreader-lock" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Princess Treatment NOW</title>

    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        let theme;
        // default theme based on prefers color scheme
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (stored === 'dark' || prefersDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Google Fonts for Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
